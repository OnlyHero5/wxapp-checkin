services:
  mysql:
    image: mysql:8.4
    container_name: wxcheckin-mysql
    env_file:
      - ./.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/docker/mysql-init/01_suda_union_seed.sql:/docker-entrypoint-initdb.d/01_suda_union_seed.sql:ro
      - ./scripts/docker/mysql-init/02_bootstrap_wxcheckin_ext.sh:/docker-entrypoint-initdb.d/02_bootstrap_wxcheckin_ext.sh:ro
      - ./scripts/bootstrap-prod-schema.sql:/docker-entrypoint-initdb.d/bootstrap-prod-schema.sql.disabled:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: wxcheckin-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wxcheckin-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
