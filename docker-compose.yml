services:
  wxapp-checkin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${DOCKER_BUILD_ALL_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-}
      extra_hosts:
        - "host.docker.internal:${HOST_DOCKER_INTERNAL_TARGET:-host-gateway}"
    container_name: wxapp-checkin
    environment:
      # Docker 发布统一从 `.env.docker` 读取数据库连接字段：
      # - 当前示例值默认指向 `host.docker.internal:3317`；
      # - 生产环境若主机、端口或账号不同，只改 `.env.docker` 即可；
      # - 容器内仍然只把 Rust 后端监听在 8080，外部统一经由 nginx:89。
      DATABASE_URL: mysql://${SUDA_UNION_DB_USER:-suda_union}:${SUDA_UNION_DB_PASSWORD:-replace-me}@${SUDA_UNION_DB_HOST:-host.docker.internal}:${SUDA_UNION_DB_PORT:-3317}/${SUDA_UNION_DB_NAME:-suda_union}
      QR_SIGNING_KEY: ${WXAPP_QR_SIGNING_KEY:-replace-this-before-prod}
      SERVER_PORT: ${WXAPP_INTERNAL_PORT:-8080}
      SESSION_TTL_SECONDS: ${WXAPP_SESSION_TTL_SECONDS:-7200}
      TOKIO_WORKER_THREADS: ${WXAPP_TOKIO_WORKER_THREADS:-2}
      MYSQL_MAX_CONNECTIONS: ${WXAPP_MYSQL_MAX_CONNECTIONS:-4}
    extra_hosts:
      # 当前示例 host 依赖 `host.docker.internal` 回连宿主机；
      # 如需改成其它数据库入口，仍然只在 `.env.docker` 中改 `SUDA_UNION_DB_*`。
      - "host.docker.internal:${HOST_DOCKER_INTERNAL_TARGET:-host-gateway}"
    networks:
      - three-projects-net
    ports:
      - "${WXAPP_HTTP_PORT:-89}:89"
    logging:
      driver: json-file
      options:
        max-size: ${WXAPP_DOCKER_LOG_MAX_SIZE:-5m}
        max-file: ${WXAPP_DOCKER_LOG_MAX_FILE:-2}
    restart: unless-stopped

networks:
  three-projects-net:
    external: true
    name: ${DOCKER_NETWORK:-three-projects-net}
