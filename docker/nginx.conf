worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  server {
    listen 89;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 单容器方案下，宿主机只需要一个健康检查口；
    # 这里先给 nginx 自身一个轻量探针，避免每次都穿透业务接口。
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # 如需确认 Rust 后端已正常拉起，可走这个只读代理探针。
    location = /backend-healthz {
      proxy_pass http://127.0.0.1:8080/actuator/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web 正式 API 仍然冻结在 `/api/web/**`；
    # 单容器内直接回环到本机 8080，避免再拆容器。
    location /api/web/ {
      proxy_pass http://127.0.0.1:8080/api/web/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其余路径全部按 SPA fallback 处理，保证刷新前端路由不 404。
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}

